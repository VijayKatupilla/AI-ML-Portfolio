<svg viewBox="0 0 1040 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0D1117; }
      .panel { fill: #161B22; stroke: #2A313C; stroke-width: 1; }
      .title { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; fill: #F0F6FC; }
      .subtitle { font-family: 'JetBrains Mono', 'Courier New', monospace; fill: #8B949E; }
      .label { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; }
      .desc { font-family: Arial, Helvetica, sans-serif; fill: #F0F6FC; }
      .cardtitle { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 700; fill: #F0F6FC; }
      .carddesc { font-family: Arial, Helvetica, sans-serif; fill: #8B949E; }
      .tag { font-family: 'JetBrains Mono', 'Courier New', monospace; fill: #0D1117; font-weight: 700; }
      .footer { font-family: 'JetBrains Mono', 'Courier New', monospace; fill: #8B949E; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="720"/>

  <!-- Title -->
  <text x="520" y="46" text-anchor="middle" class="title" font-size="26">Understanding AI, ML &amp; Deep Learning</text>
  <text x="520" y="70" text-anchor="middle" class="subtitle" font-size="13">How the three fields relate, and the three ways machines learn</text>

  <!-- LEFT: nested circles -->
  <circle cx="270" cy="400" r="230" fill="none" stroke="#A78BFA" stroke-width="2.5"/>
  <circle cx="270" cy="410" r="160" fill="none" stroke="#22D3EE" stroke-width="2.5"/>
  <circle cx="270" cy="425" r="85" fill="rgba(74,222,128,0.10)" stroke="#4ADE80" stroke-width="2.5"/>

  <text x="270" y="205" text-anchor="middle" class="label" font-size="17" fill="#A78BFA">ARTIFICIAL INTELLIGENCE</text>
  <text x="270" y="228" text-anchor="middle" class="desc" font-size="12">Any system built to perform tasks</text>
  <text x="270" y="244" text-anchor="middle" class="desc" font-size="12">that normally require human thinking</text>

  <text x="270" y="278" text-anchor="middle" class="label" font-size="15" fill="#22D3EE">MACHINE LEARNING</text>
  <text x="270" y="298" text-anchor="middle" class="desc" font-size="11">Systems that learn patterns</text>
  <text x="270" y="313" text-anchor="middle" class="desc" font-size="11">from data instead of fixed rules</text>

  <text x="270" y="418" text-anchor="middle" class="label" font-size="13" fill="#4ADE80">DEEP</text>
  <text x="270" y="435" text-anchor="middle" class="label" font-size="13" fill="#4ADE80">LEARNING</text>
  <text x="270" y="453" text-anchor="middle" class="desc" font-size="10">Neural networks that</text>
  <text x="270" y="466" text-anchor="middle" class="desc" font-size="10">learn features on their own</text>

  <text x="270" y="670" text-anchor="middle" class="subtitle" font-size="12">Deep learning is a subset of machine learning,</text>
  <text x="270" y="688" text-anchor="middle" class="subtitle" font-size="12">which is a subset of artificial intelligence.</text>

  <!-- RIGHT: Types of ML -->
  <text x="620" y="140" class="title" font-size="18">Types of Machine Learning</text>

  <!-- Card 1: Supervised -->
  <rect class="panel" x="620" y="165" width="380" height="110" rx="8"/>
  <rect x="620" y="165" width="6" height="110" fill="#4ADE80"/>
  <rect x="644" y="182" width="118" height="22" rx="11" fill="#4ADE80"/>
  <text x="703" y="197" text-anchor="middle" class="tag" font-size="11">SUPERVISED</text>
  <text x="644" y="228" class="cardtitle" font-size="14">Learns from labeled examples</text>
  <text x="644" y="248" class="carddesc" font-size="12">Given inputs paired with known correct</text>
  <text x="644" y="264" class="carddesc" font-size="12">answers. Example: email spam detection.</text>

  <!-- Card 2: Unsupervised -->
  <rect class="panel" x="620" y="290" width="380" height="110" rx="8"/>
  <rect x="620" y="290" width="6" height="110" fill="#22D3EE"/>
  <rect x="644" y="307" width="134" height="22" rx="11" fill="#22D3EE"/>
  <text x="711" y="322" text-anchor="middle" class="tag" font-size="11">UNSUPERVISED</text>
  <text x="644" y="353" class="cardtitle" font-size="14">Finds structure with no labels</text>
  <text x="644" y="373" class="carddesc" font-size="12">Groups or patterns are discovered on</text>
  <text x="644" y="389" class="carddesc" font-size="12">their own. Example: customer segmentation.</text>

  <!-- Card 3: Reinforcement -->
  <rect class="panel" x="620" y="415" width="380" height="110" rx="8"/>
  <rect x="620" y="415" width="6" height="110" fill="#F59E0B"/>
  <rect x="644" y="432" width="150" height="22" rx="11" fill="#F59E0B"/>
  <text x="719" y="447" text-anchor="middle" class="tag" font-size="11">REINFORCEMENT</text>
  <text x="644" y="478" class="cardtitle" font-size="14">Learns through trial and reward</text>
  <text x="644" y="498" class="carddesc" font-size="12">An agent takes actions and learns from</text>
  <text x="644" y="514" class="carddesc" font-size="12">outcomes. Example: autonomous driving.</text>

  <!-- Note -->
  <rect class="panel" x="620" y="545" width="380" height="72" rx="8"/>
  <text x="644" y="570" class="carddesc" font-size="12" fill="#F0F6FC">Deep learning shows up across all three types —</text>
  <text x="644" y="588" class="carddesc" font-size="12" fill="#F0F6FC">it's a modeling approach, not a fourth category.</text>
  <text x="644" y="606" class="carddesc" font-size="12" fill="#F0F6FC">CNNs, for example, are typically supervised.</text>

  <text x="1000" y="700" text-anchor="end" class="footer" font-size="11">AIML-500 · Workshop 2 · Vijay Katupilla</text>
</svg>
